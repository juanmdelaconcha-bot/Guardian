<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📍 GUARDIAN — Ubicación en Vivo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, sans-serif; background:#0a0a0a; color:#fff; height:100vh; display:flex; flex-direction:column; }

.top-bar {
background:#FF1A1A; padding:14px 18px;
display:flex; align-items:center; gap:12px;
z-index:10; flex-shrink:0;
}
.pulse-dot {
width:10px; height:10px; border-radius:50%; background:#fff;
animation: pulse 1.2s ease-in-out infinite; flex-shrink:0;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.top-info { flex:1; }
.top-title { font-size:15px; font-weight:700; letter-spacing:.5px; }
.top-sub { font-size:11px; opacity:.85; margin-top:1px; }
.top-time { font-size:11px; font-family:monospace; opacity:.8; }

#map { flex:1; width:100%; }

.bottom-card {
background:#111; border-top:1px solid rgba(255,255,255,0.08);
padding:14px 18px; flex-shrink:0;
}
.coords-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.coords-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#555; font-family:monospace; }
#coords-val { font-size:13px; font-family:monospace; color:#FF1A1A; }
.info-row { display:flex; gap:12px; }
.info-chip { background:#1a1a1a; border:1px solid rgba(255,255,255,0.07); border-radius:8px; padding:7px 12px; flex:1; text-align:center; }
.info-chip .val { font-size:14px; font-weight:600; color:#fff; font-family:monospace; }
.info-chip .lbl { font-size:9px; color:#555; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }

.offline-banner {
display:none; background:#1a0a00; border:1px solid rgba(255,140,0,0.3);
margin:10px 18px; border-radius:10px; padding:11px 14px;
font-size:12px; color:rgba(255,140,0,0.9); line-height:1.5;
}
.offline-banner.show { display:block; }

.wa-btn {
display:block; background:#25D366; border-radius:10px;
padding:12px; text-align:center; text-decoration:none;
color:#fff; font-weight:600; font-size:14px; margin-top:10px;
}
</style>

<!-- Leaflet for real map -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Firebase -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXlBFfqj9IarzYVpDgvtulb_eEHGQ-aWs",
  authDomain: "guardian-sos-d410f.firebaseapp.com",
  databaseURL: "https://guardian-sos-d410f-default-rtdb.firebaseio.com",
  projectId: "guardian-sos-d410f",
  storageBucket: "guardian-sos-d410f.firebasestorage.app",
  messagingSenderId: "356894459494",
  appId: "1:356894459494:web:2d06bb9506b3f47a0a4fa7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Map setup ──
const map = L.map('map', { zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19
}).addTo(map);
map.setView([19.4326, -99.1332], 15); // Default Mexico City

// Custom red marker
const markerIcon = L.divIcon({
  html: `<div style="
    width:20px;height:20px;background:#FF1A1A;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);border:3px solid #fff;
    box-shadow:0 0 20px rgba(255,26,26,0.8),0 0 0 6px rgba(255,26,26,0.2)">
  </div>`,
  iconSize:[20,20], iconAnchor:[10,20], className:''
});

let marker = null;
let accuracyCircle = null;
let firstLoad = true;
let lastUpdateTime = null;
let offlineTimer = null;

// ── Listen to Firebase ──
const locRef = ref(db, 'location');
onValue(locRef, (snapshot) => {
  const d = snapshot.val();
  if (!d || !d.lat || !d.lng) return;

  const latlng = [d.lat, d.lng];
  lastUpdateTime = d.timestamp ? new Date(d.timestamp) : new Date();

  // Update marker
  if (!marker) {
    marker = L.marker(latlng, { icon: markerIcon }).addTo(map);
  } else {
    marker.setLatLng(latlng);
  }

  // Accuracy circle
  if (d.accuracy) {
    if (!accuracyCircle) {
      accuracyCircle = L.circle(latlng, {
        radius: d.accuracy,
        color: '#FF1A1A', fillColor: '#FF1A1A',
        fillOpacity: 0.08, weight: 1
      }).addTo(map);
    } else {
      accuracyCircle.setLatLng(latlng).setRadius(d.accuracy);
    }
  }

  if (firstLoad) {
    map.setView(latlng, 17);
    firstLoad = false;
  } else {
    map.panTo(latlng, { animate: true, duration: 1 });
  }

  // Update UI
  document.getElementById('coords-val').textContent =
    `${d.lat.toFixed(6)}, ${d.lng.toFixed(6)}`;
  document.getElementById('acc-val').textContent =
    d.accuracy ? `±${Math.round(d.accuracy)}m` : '—';
  document.getElementById('speed-val').textContent =
    d.speed != null ? `${(d.speed * 3.6).toFixed(1)} km/h` : '—';
  document.getElementById('update-val').textContent = fmtTime(lastUpdateTime);
  document.getElementById('name-val').textContent = d.name || 'Usuario';
  document.querySelector('.top-sub').textContent =
    `Última actualización: ${fmtTime(lastUpdateTime)}`;

  // Update WhatsApp link
  const waLink = document.getElementById('wa-link');
  waLink.href = `https://wa.me/?text=${encodeURIComponent(`📍 Ver ubicación en vivo: ${window.location.href}`)}`;

  // Reset offline detection
  document.querySelector('.offline-banner').classList.remove('show');
  clearTimeout(offlineTimer);
  offlineTimer = setTimeout(() => {
    document.querySelector('.offline-banner').classList.add('show');
  }, 30000); // 30s without update = offline warning
});

function fmtTime(d) {
  if (!d) return '—';
  return d.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// Update clock
setInterval(() => {
  if (lastUpdateTime) {
    const secs = Math.round((Date.now() - lastUpdateTime.getTime()) / 1000);
    document.querySelector('.top-time').textContent =
      secs < 60 ? `Hace ${secs}s` : `Hace ${Math.floor(secs/60)}min`;
  }
}, 1000);
</script>

</head>
<body>

<div class="top-bar">
  <div class="pulse-dot"></div>
  <div class="top-info">
    <div class="top-title">🚨 <span id="name-val">Cargando...</span> — EMERGENCIA</div>
    <div class="top-sub">Conectando con Firebase...</div>
  </div>
  <div class="top-time" id="update-time">—</div>
</div>

<div id="map"></div>

<div class="offline-banner">
  ⚠ Sin actualizaciones de ubicación en los últimos 30 segundos. El dispositivo puede estar sin señal.
</div>

<div class="bottom-card">
  <div class="coords-row">
    <span class="coords-label">GPS</span>
    <span id="coords-val" style="font-size:13px;font-family:monospace;color:#FF1A1A">Esperando señal...</span>
  </div>
  <div class="info-row">
    <div class="info-chip">
      <div class="val" id="acc-val">—</div>
      <div class="lbl">Precisión</div>
    </div>
    <div class="info-chip">
      <div class="val" id="speed-val">—</div>
      <div class="lbl">Velocidad</div>
    </div>
    <div class="info-chip">
      <div class="val" id="update-val">—</div>
      <div class="lbl">Actualizado</div>
    </div>
  </div>
  <a class="wa-btn" id="wa-link" href="#" target="_blank">
    📲 Compartir este mapa por WhatsApp
  </a>
</div>

</body>
</html>

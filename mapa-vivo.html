<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUARDIAN — Ubicación en Vivo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#status-bar{background:#FF1A1A;padding:48px 18px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.pulse{width:10px;height:10px;border-radius:50%;background:#fff;animation:p 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
#status-title{font-size:15px;font-weight:700;flex:1}
#status-ago{font-size:11px;font-family:monospace;opacity:.8}
#map{flex:1;width:100%;position:relative;background:#111}
#map-canvas{width:100%;height:100%}
#bottom{background:#111;border-top:1px solid rgba(255,255,255,.08);padding:14px 18px;flex-shrink:0}
#coords{font-size:12px;font-family:monospace;color:#FF1A1A;margin-bottom:10px}
.chips{display:flex;gap:8px;margin-bottom:10px}
.chip{background:#1a1a1a;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:7px 12px;flex:1;text-align:center}
.chip-v{font-size:13px;font-weight:700;font-family:monospace}
.chip-l{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
#share-btn{display:block;width:100%;background:#25D366;border:none;border-radius:10px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
/* Loading overlay */
#overlay{position:absolute;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.08);border-top-color:#FF1A1A;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#overlay-text{font-family:monospace;font-size:12px;letter-spacing:2px;color:#444;text-transform:uppercase;text-align:center;padding:0 30px;line-height:1.8}
/* Error */
#error-box{display:none;position:absolute;inset:0;background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;text-align:center;z-index:10}
#error-box .icon{font-size:52px}
#error-box .title{font-size:17px;font-weight:700}
#error-box .sub{font-size:13px;color:#555;line-height:1.65}
/* Offline warning */
#offline{display:none;background:#1a0800;border:1px solid rgba(255,140,0,.3);margin:8px 14px;border-radius:9px;padding:10px 14px;font-size:12px;color:rgba(255,140,0,.9);line-height:1.5}
/* Map pin */
#pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);pointer-events:none;animation:bounce 2s ease-in-out infinite;z-index:5}
@keyframes bounce{0%,100%{transform:translate(-50%,-100%)}50%{transform:translate(-50%,-115%)}}
.pin-body{width:20px;height:20px;background:#FF1A1A;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 0 20px rgba(255,26,26,.8)}
.pin-ring{position:absolute;width:34px;height:34px;border:2px solid #FF1A1A;border-radius:50%;top:-7px;left:-7px;animation:ring 2s ease-out infinite}
@keyframes ring{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.6);opacity:0}}
</style>
<!-- Leaflet real map -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GUARDIAN">
<meta name="theme-color" content="#FF1A1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<div id="status-bar">
  <div class="pulse"></div>
  <div id="status-title">🚨 Conectando…</div>
  <div id="status-ago">—</div>
</div>

<div id="map">
  <!-- Loading overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <div id="overlay-text">Conectando con Firebase…</div>
  </div>
  <!-- Error box -->
  <div id="error-box">
    <div class="icon">📍</div>
    <div class="title" id="err-title">Sin ubicación</div>
    <div class="sub" id="err-sub">La persona no ha activado el SOS aún.</div>
  </div>
  <!-- Map tiles -->
  <div id="map-tiles" style="width:100%;height:100%;display:none"></div>
  <!-- Pin overlay -->
  <div id="pin" style="display:none">
    <div class="pin-ring"></div>
    <div class="pin-body"></div>
  </div>
</div>

<div id="offline">⚠ Sin señal hace más de 30 segundos</div>

<div id="bottom">
  <div id="coords">Esperando señal GPS…</div>
  <div class="chips">
    <div class="chip"><div class="chip-v" id="acc">—</div><div class="chip-l">Precisión</div></div>
    <div class="chip"><div class="chip-v" id="spd">—</div><div class="chip-l">Velocidad</div></div>
    <div class="chip"><div class="chip-v" id="upd">—</div><div class="chip-l">Actualizado</div></div>
  </div>
  <button id="share-btn" onclick="shareMap()">📲 Compartir este mapa</button>
</div>

<script type="module">
// ── Firebase ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXlBFfqj9IarzYVpDgvtulb_eEHGQ-aWs",
  authDomain: "guardian-sos-d410f.firebaseapp.com",
  databaseURL: "https://guardian-sos-d410f-default-rtdb.firebaseio.com",
  projectId: "guardian-sos-d410f",
  storageBucket: "guardian-sos-d410f.firebasestorage.app",
  messagingSenderId: "356894459494",
  appId: "1:356894459494:web:2d06bb9506b3f47a0a4fa7"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ── Get UID from URL ──
const uid = new URLSearchParams(window.location.search).get('uid');
console.log('UID from URL:', uid);

if (!uid) {
  showError('Link incompleto', 'Este link no tiene el identificador del usuario. Pide que te reenvíen el link desde GUARDIAN.');
} else {
  startListening(uid);
}

// ── Leaflet map ──
let map = null;
let marker = null;
let circle = null;
let firstFix = true;
let lastUpdate = null;
let offlineTimer = null;
let hasData = false;

function initLeaflet() {
  if (map) return;
  const container = document.getElementById('map-tiles');
  container.style.display = 'block';
  map = L.map(container, { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);
  map.setView([19.4326, -99.1332], 15);
}

// ── Listen to Firebase ──
function startListening(uid) {
  console.log('Listening to: usuarios/' + uid + '/location');
  document.getElementById('overlay-text').textContent = 'Esperando ubicación de ' + uid.slice(0,8) + '…';

  const locRef = ref(db, 'usuarios/' + uid + '/location');

  onValue(locRef, (snap) => {
    console.log('Firebase snapshot:', snap.val());
    const d = snap.val();

    if (!d || !d.lat || !d.lng) {
      // No data yet — keep showing loader but update text
      if (!hasData) {
        document.getElementById('overlay-text').textContent =
          'Esperando que la persona active el SOS…\n\nEsta página se actualizará automáticamente.';
      }
      return;
    }

    // ── Got location data! ──
    hasData = true;
    lastUpdate = d.timestamp ? new Date(d.timestamp) : new Date();

    // Hide overlays, show map
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';

    // Init map on first data
    initLeaflet();

    const latlng = [d.lat, d.lng];

    // Update/create marker
    if (!marker) {
      const icon = L.divIcon({
        html: '<div style="width:16px;height:16px;background:#FF1A1A;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 0 16px rgba(255,26,26,.9)"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 16],
        className: ''
      });
      marker = L.marker(latlng, { icon }).addTo(map);
      marker.bindPopup('<b>' + (d.nombre || 'Usuario') + '</b><br>' + d.lat.toFixed(5) + ', ' + d.lng.toFixed(5));
    } else {
      marker.setLatLng(latlng);
    }

    // Accuracy circle
    if (d.accuracy) {
      if (!circle) {
        circle = L.circle(latlng, {
          radius: d.accuracy,
          color: '#FF1A1A', fillColor: '#FF1A1A', fillOpacity: 0.08, weight: 1
        }).addTo(map);
      } else {
        circle.setLatLng(latlng).setRadius(d.accuracy);
      }
    }

    // Pan map
    if (firstFix) {
      map.setView(latlng, 17);
      firstFix = false;
    } else {
      map.panTo(latlng, { animate: true, duration: 1.2 });
    }

    // Update UI
    const name = d.nombre || 'Usuario';
    document.getElementById('status-title').textContent = '🚨 ' + name + ' — EN EMERGENCIA';
    document.getElementById('coords').textContent =
      '📍 ' + d.lat.toFixed(6) + ', ' + d.lng.toFixed(6);
    document.getElementById('acc').textContent =
      d.accuracy ? '±' + Math.round(d.accuracy) + 'm' : '—';
    document.getElementById('spd').textContent =
      (d.speed != null && d.speed > 0) ? (d.speed * 3.6).toFixed(0) + ' km/h' : '0 km/h';
    document.getElementById('upd').textContent = fmtTime(lastUpdate);

    // Offline detection
    document.getElementById('offline').style.display = 'none';
    clearTimeout(offlineTimer);
    offlineTimer = setTimeout(() => {
      document.getElementById('offline').style.display = 'block';
    }, 30000);

  }, (error) => {
    console.error('Firebase error:', error);
    showError('Error de conexión', 'No se pudo conectar: ' + error.message);
  });

  // Also listen to emergency status
  const emgRef = ref(db, 'usuarios/' + uid + '/emergencia');
  onValue(emgRef, (snap) => {
    const emg = snap.val();
    if (emg && emg.activa === false && hasData) {
      document.getElementById('status-bar').style.background = '#333';
      document.getElementById('status-title').textContent = '✓ Emergencia finalizada';
    }
  });

  // Timeout: after 15s still no data, show helpful message
  setTimeout(() => {
    if (!hasData) {
      document.getElementById('overlay-text').innerHTML =
        '📡 Esperando activación SOS…<br><br>' +
        '<span style="color:#333">La persona debe abrir GUARDIAN y activar el SOS para que aparezca su ubicación aquí.</span>';
    }
  }, 15000);
}

// ── Clock ──
setInterval(() => {
  if (lastUpdate) {
    const s = Math.round((Date.now() - lastUpdate.getTime()) / 1000);
    document.getElementById('status-ago').textContent =
      s < 60 ? 'Hace ' + s + 's' : 'Hace ' + Math.floor(s/60) + 'min';
    document.getElementById('upd').textContent = fmtTime(lastUpdate);
  }
}, 1000);

function fmtTime(d) {
  if (!d) return '—';
  return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function showError(title, sub) {
  document.getElementById('overlay').style.display = 'none';
  const eb = document.getElementById('error-box');
  eb.style.display = 'flex';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-sub').textContent = sub;
}

window.shareMap = () => {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: '🚨 Ubicación en vivo — GUARDIAN', url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('Link copiado'));
  }
};
</script>

</body>
</html>
